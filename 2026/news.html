<script>
// ===== State =====
let currentLang = "zh";
let I18N_DATA = {};   // 從 data/iplayground_i18n.json 載入
const NEWS_DATA_URLS = {
  zh: "https://raw.githubusercontent.com/iplayground/SessionData/refs/heads/develop/news.json",
  en: "https://raw.githubusercontent.com/iplayground/SessionData/refs/heads/develop/news_en.json",
};
let NEWS_DATA_BY_LANG = { zh: [], en: [] };
let NEWS_DATA = [];   // 從 GitHub raw HTTPS 來源載入
let CONFIG    = {};   // 從 data/iplayground_config.json 載入
let LINKS     = {};

// ===== i18n helpers =====
function t(key) {
  const entry = I18N_DATA[key];
  if (!entry) return key;
  if (key === 'footer_tagline') return CONFIG.footerTagline ? CONFIG.footerTagline[currentLang] : '';
  return entry[currentLang] || entry['zh'] || key;
}

function getVal(obj) {
  if (typeof obj === 'string') return obj;
  return obj[currentLang] || obj.zh || "";
}

function getContentHtml(content) {
  return getVal(content).replace(/\\n|\r\n|\r|\n/g, "<br>");
}

function escapeHtml(value) {
  return String(value || "").replace(/[&<>"']/g, ch => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#39;",
  }[ch]));
}

function applyLinks(links) {
  if (!links) return;
  const map = {};
  Object.entries(links.important || {}).forEach(([key, value]) => { map[key] = value; });
  Object.entries(links.contact || {}).forEach(([key, value]) => { map[`contact_${key}`] = value; });
  (links.social || []).forEach(item => { map[`social_${item.id}`] = item.url; });

  document.querySelectorAll("[data-link]").forEach(el => {
    const url = map[el.dataset.link];
    if (url) el.href = url;
  });
}

function normalizeButtons(buttons) {
  if (!buttons) return [];
  if (Array.isArray(buttons)) return buttons;
  if (Array.isArray(buttons[currentLang])) return buttons[currentLang];
  if (buttons.url || buttons.href || buttons.link) return [buttons];
  return [];
}

function renderArticleButtons(buttons) {
  const links = normalizeButtons(buttons).map(button => {
    if (!button || typeof button !== "object") return "";
    const label = getVal(button.label || button.title || button.text || button.name || button.content || "");
    const url = button.url || button.href || button.link || "";
    if (!label || !url) return "";
    return `<a class="article-cta" href="${escapeHtml(url)}" target="_blank" rel="noopener">${escapeHtml(label)}</a>`;
  }).filter(Boolean);

  if (!links.length) return "";
  return `<div class="article-actions">${links.join("")}</div>`;
}

function setMeta(name, value, attr = "property") {
  const selector = attr === "name" ? `meta[name="${name}"]` : `meta[property="${name}"]`;
  const el = document.querySelector(selector);
  if (el) el.setAttribute("content", value);
}

function articleUrl(id) {
  return new URL(`news.html?id=${id}`, window.location.href).href;
}

function bindShareButtons() {
  document.querySelectorAll("[data-copy-share]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const url = btn.dataset.copyShare;
      const original = btn.textContent;
      try {
        await navigator.clipboard.writeText(url);
        btn.textContent = currentLang === "en" ? "Copied" : "已複製";
      } catch (e) {
        window.prompt(currentLang === "en" ? "Copy this link" : "請複製此連結", url);
      }
      setTimeout(() => { btn.textContent = original; }, 1600);
    });
  });
}

function plainTextFromHtml(html) {
  const div = document.createElement("div");
  div.innerHTML = html || "";
  return (div.textContent || div.innerText || "").replace(/\s+/g, " ").trim();
}

function articleDescription(article) {
  const text = plainTextFromHtml(getContentHtml(article?.content || ""));
  if (!text) return currentLang === "en" ? "Latest news from iPlayground 2026." : "iPlayground 2026 最新消息";
  return text.length > 140 ? `${text.slice(0, 140)}…` : text;
}

function updateArticleMeta(id, title, article) {
  const url = articleUrl(id);
  const desc = articleDescription(article);
  setMeta("description", desc, "name");
  setMeta("og:title", title);
  setMeta("og:description", desc);
  setMeta("og:url", url);
  setMeta("twitter:title", title, "name");
  setMeta("twitter:description", desc, "name");
}

// ===== Appearance =====
const mql = window.matchMedia("(prefers-color-scheme: dark)");
function resolveMode(pref) {
  return (pref === "light" || pref === "dark") ? pref : (mql.matches ? "dark" : "light");
}
function applyAppearance(pref) {
  document.documentElement.dataset.mode = resolveMode(pref);
  if (typeof syncFabMode === "function") syncFabMode(pref);
  try { localStorage.setItem("appearance", pref); } catch(e) {}
}
mql.addEventListener("change", () => {
  const saved = (() => { try { return localStorage.getItem("appearance"); } catch(e) { return null; } })() || "auto";
  if (saved === "auto") applyAppearance("auto");
});

// ===== i18n apply =====
function applyLang(lang) {
  currentLang = lang;
  NEWS_DATA = NEWS_DATA_BY_LANG[lang] || NEWS_DATA_BY_LANG.zh || [];
  document.documentElement.lang = lang === "zh" ? "zh-Hant" : "en";
  document.querySelectorAll("#langSwitch button").forEach(b =>
    b.classList.toggle("active", b.dataset.lang === lang)
  );
  document.getElementById("backLink").textContent = t("news_back");
  document.querySelectorAll("[data-i18n]").forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  const footerTagline = document.getElementById("footerTagline");
  if (footerTagline) footerTagline.textContent = t("footer_tagline");
  if (typeof syncFabLang === "function") syncFabLang(lang);
  try { localStorage.setItem("lang", lang); } catch(e) {}
  renderPage();
}
document.getElementById("langSwitch").addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-lang]");
  if (btn) applyLang(btn.dataset.lang);
});

// ===== Routing & Render =====
function renderPage() {
  const params = new URLSearchParams(window.location.search);
  const root = document.getElementById("pageRoot");
  const idParam = params.get("id");

  if (idParam === null) {
    document.title = `${t("news_all_news")} · iPlayground 2026`;
    root.innerHTML = `
      <div class="wrap">
        <div class="listing-header">
          <h1>${t("news_all_news")}</h1>
          <p>${t("news_all_news_sub")}</p>
        </div>
        <div class="listing-grid">
          ${NEWS_DATA.map((n, i) => `
            <a class="listing-row" href="news.html?id=${i}">
              <div class="l-date">${n.date}</div>
              <div class="l-title">${getVal(n.title)}</div>
              <div class="l-arrow">→</div>
            </a>
          `).join("")}
        </div>
      </div>
    `;
    return;
  }

  const id = parseInt(idParam, 10);
  if (isNaN(id) || id < 0 || id >= NEWS_DATA.length) {
    root.innerHTML = `<div class="msg">${t("news_not_found")}<br><a href="index.html" style="color:var(--accent);">${t("news_back_home")}</a></div>`;
    return;
  }

  const n = NEWS_DATA[id];
  const titleStr = getVal(n.title);
  updateArticleMeta(id, titleStr, n);
  document.title = `${titleStr} · iPlayground 2026`;

  const sidebar = NEWS_DATA.map((item, i) => `
    <a class="sidebar-item ${i === id ? 'active' : ''}" href="news.html?id=${i}">
      <div class="s-date">${item.date}</div>
      <div class="s-title">${getVal(item.title)}</div>
    </a>
  `).join("");

  const options = NEWS_DATA.map((item, i) =>
    `<option value="${i}" ${i === id ? 'selected' : ''}>${item.date}　${getVal(item.title)}</option>`
  ).join("");

  root.innerHTML = `
    <div class="mobile-picker" id="mobilePicker">
      <label>${t("news_mobile_label")}</label>
      <select id="newsSelect">${options}</select>
    </div>
    <div class="news-page-layout">
      <aside class="news-sidebar">
        <div class="sidebar-heading">${t("news_sidebar_heading")}</div>
        ${sidebar}
      </aside>
      <main class="news-main">
        <header class="article-header" id="artHeader">
          <div class="article-date">${n.date}</div>
          <h1 class="article-title">${titleStr}</h1>
        </header>
        <article class="article-body" id="artBody">
          ${getContentHtml(n.content)}
          ${renderArticleButtons(n.buttons)}
        </article>
      </main>
    </div>
  `;
  bindShareButtons();

  document.querySelectorAll(".sidebar-item").forEach(link => {
    link.addEventListener("click", (event) => {
      const target = new URL(link.href, window.location.href);
      event.preventDefault();
      history.pushState(null, "", target.pathname + target.search);
      window.scrollTo({ top: 0, left: 0, behavior: "auto" });
      renderPage();
    });
  });

  const sel = document.getElementById("newsSelect");
  if (sel) {
    sel.addEventListener("change", function() {
      const newId = parseInt(this.value, 10);
      const item = NEWS_DATA[newId];
      const iTitle = getVal(item.title);
      document.getElementById("artHeader").innerHTML = `
        <div class="article-date">${item.date}</div>
        <h1 class="article-title">${iTitle}</h1>
      `;
      document.getElementById("artBody").innerHTML = `
        ${getContentHtml(item.content)}
        ${renderArticleButtons(item.buttons)}
      `;
      document.title = `${iTitle} · iPlayground 2026`;
      updateArticleMeta(newId, iTitle, item);
      bindShareButtons();
      history.replaceState(null, "", `news.html?id=${newId}`);
      window.scrollTo({ top: 0, left: 0, behavior: "auto" });
    });
  }
}

// ===== Init — 並行載入所有資料後初始化 =====
const savedLang = (() => { try { return localStorage.getItem("lang"); } catch(e) { return null; } })() || "zh";
const savedAppearance = (() => { try { return localStorage.getItem("appearance"); } catch(e) { return null; } })() || "auto";
const savedHue = (() => { try { return localStorage.getItem("hue"); } catch(e) { return null; } })() || 230;
document.documentElement.style.setProperty("--hue", savedHue);
applyAppearance(savedAppearance);

Promise.all([
  fetch("data/iplayground_i18n.json").then(r => r.json()),
  fetch(NEWS_DATA_URLS.zh).then(r => r.json()),
  fetch(NEWS_DATA_URLS.en).then(r => r.json()),
  fetch("data/iplayground_config.json").then(r => r.json()),
  fetch("data/iplayground_links.json").then(r => r.json()),
]).then(([i18n, newsZh, newsEn, config, links]) => {
  I18N_DATA = i18n;
  NEWS_DATA_BY_LANG = { zh: newsZh, en: newsEn };
  CONFIG     = config;
  LINKS      = links;
  applyLinks(LINKS);
  applyLang(savedLang);
}).catch(e => {
  console.warn("資料載入失敗", e);
  applyLang(savedLang);
});
</script>

    <svg class="fab-icon fab-icon--light" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
    <svg class="fab-icon fab-icon--dark" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
  <button class="fab" id="fabLang" aria-label="Toggle language">
    <span class="fab-lang-label">中</span>
  </button>
  <button class="fab fab--top" id="fabTop" aria-label="Back to top">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>
  </button>
</div>

<script>
const modeOrder = ["auto", "light", "dark"];
const fabMode = document.getElementById("fabMode");
const fabLang = document.getElementById("fabLang");
const fabTop  = document.getElementById("fabTop");
const fabGroup = document.getElementById("fabGroup");

function syncFabMode(pref) {
  if (fabGroup) fabGroup.dataset.fabMode = pref;
}

function syncFabLang(lang) {
  const label = fabLang?.querySelector(".fab-lang-label");
  if (label) label.textContent = lang === "zh" ? "中" : "EN";
}

fabMode?.addEventListener("click", () => {
  const cur = (() => { try { return localStorage.getItem("appearance"); } catch(e) { return "auto"; } })() || "auto";
  const next = modeOrder[(modeOrder.indexOf(cur) + 1) % modeOrder.length];
  applyAppearance(next);
  syncFabMode(next);
});

fabLang?.addEventListener("click", () => {
  applyLang(currentLang === "zh" ? "en" : "zh");
});

fabTop?.addEventListener("click", () => {
  window.scrollTo({ top: 0, behavior: "smooth" });
});

window.addEventListener("scroll", () => {
  fabTop?.classList.toggle("visible", window.scrollY > 300);
}, { passive: true });

syncFabMode((() => { try { return localStorage.getItem("appearance"); } catch(e) { return null; } })() || "auto");
syncFabLang(currentLang);
</script>
