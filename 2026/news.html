<script>
// ===== State =====
let currentLang = "zh";
let I18N_DATA = {};   // 從 data/iplayground_i18n.json 載入
let NEWS_DATA = [];   // 從 data/iplayground_news.json 載入
let CONFIG    = {};   // 從 data/iplayground_config.json 載入

// ===== i18n helpers =====
function t(key) {
  const entry = I18N_DATA[key];
  if (!entry) return key;
  if (key === 'footer_tagline') return CONFIG.footerTagline ? CONFIG.footerTagline[currentLang] : '';
  return entry[currentLang] || entry['zh'] || key;
}

function getVal(obj) {
  if (typeof obj === 'string') return obj;
  return obj[currentLang] || obj.zh || "";
}

function setMeta(name, value, attr = "property") {
  const selector = attr === "name" ? `meta[name="${name}"]` : `meta[property="${name}"]`;
  const el = document.querySelector(selector);
  if (el) el.setAttribute("content", value);
}

function articleUrl(id) {
  return new URL(`news.html?id=${id}`, window.location.href).href;
}

function renderShareBlock(id, title) {
  const url = articleUrl(id);
  const shareLabel = currentLang === "en" ? "Share this post" : "分享這篇公告";
  const copyLabel  = currentLang === "en" ? "Copy Link" : "複製連結";
  return `
    <section class="article-share" aria-label="${shareLabel}">
      <div class="article-share-title">${shareLabel}</div>
      <div class="article-share-actions">
        <button class="share-btn" type="button" data-copy-share="${url}">${copyLabel}</button>
      </div>
    </section>
  `;
}

function bindShareButtons() {
  document.querySelectorAll("[data-copy-share]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const url = btn.dataset.copyShare;
      const original = btn.textContent;
      try {
        await navigator.clipboard.writeText(url);
        btn.textContent = currentLang === "en" ? "Copied" : "已複製";
      } catch (e) {
        window.prompt(currentLang === "en" ? "Copy this link" : "請複製此連結", url);
      }
      setTimeout(() => { btn.textContent = original; }, 1600);
    });
  });
}

function updateArticleMeta(id, title) {
  const url = articleUrl(id);
  const desc = currentLang === "en"
    ? "Recommend a company contact and help make iPlayground 2026 happen. Successful sponsorship referrals receive a two-day ticket and commemorative shirt."
    : "推薦公司窗口並促成 iPlayground 2026 贊助合作，即可獲得兩日門票與紀念衣服。";
  setMeta("description", desc, "name");
  setMeta("og:title", title);
  setMeta("og:description", desc);
  setMeta("og:url", url);
  setMeta("twitter:title", title, "name");
  setMeta("twitter:description", desc, "name");
}

// ===== Appearance =====
const mql = window.matchMedia("(prefers-color-scheme: dark)");
function resolveMode(pref) {
  return (pref === "light" || pref === "dark") ? pref : (mql.matches ? "dark" : "light");
}
function applyAppearance(pref) {
  document.documentElement.dataset.mode = resolveMode(pref);
  document.querySelectorAll("#modeSwitch button").forEach(b =>
    b.classList.toggle("active", b.dataset.mode === pref)
  );
  try { localStorage.setItem("appearance", pref); } catch(e) {}
}
document.getElementById("modeSwitch").addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-mode]");
  if (btn) applyAppearance(btn.dataset.mode);
});
mql.addEventListener("change", () => {
  const saved = (() => { try { return localStorage.getItem("appearance"); } catch(e) { return null; } })() || "auto";
  if (saved === "auto") applyAppearance("auto");
});

// ===== i18n apply =====
function applyLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang === "zh" ? "zh-Hant" : "en";
  document.querySelectorAll("#langSwitch button").forEach(b =>
    b.classList.toggle("active", b.dataset.lang === lang)
  );
  document.getElementById("backLink").textContent = t("news_back");
  const footerTagline = document.getElementById("footerTagline");
  if (footerTagline) footerTagline.textContent = t("footer_tagline");
  try { localStorage.setItem("lang", lang); } catch(e) {}
  renderPage();
}
document.getElementById("langSwitch").addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-lang]");
  if (btn) applyLang(btn.dataset.lang);
});

// ===== Routing & Render =====
function renderPage() {
  const params = new URLSearchParams(window.location.search);
  const root = document.getElementById("pageRoot");
  const idParam = params.get("id");

  if (idParam === null) {
    document.title = `${t("news_all_news")} · iPlayground 2026`;
    root.innerHTML = `
      <div class="wrap">
        <div class="listing-header">
          <h1>${t("news_all_news")}</h1>
          <p>${t("news_all_news_sub")}</p>
        </div>
        <div class="listing-grid">
          ${NEWS_DATA.map((n, i) => `
            <a class="listing-row" href="news.html?id=${i}">
              <div class="l-date">${n.date}</div>
              <div class="l-title">${getVal(n.title)}</div>
              <div class="l-arrow">→</div>
            </a>
          `).join("")}
        </div>
      </div>
    `;
    return;
  }

  const id = parseInt(idParam, 10);
  if (isNaN(id) || id < 0 || id >= NEWS_DATA.length) {
    root.innerHTML = `<div class="msg">${t("news_not_found")}<br><a href="index.html" style="color:var(--accent);">${t("news_back_home")}</a></div>`;
    return;
  }

  const n = NEWS_DATA[id];
  const titleStr = getVal(n.title);
  updateArticleMeta(id, titleStr);
  document.title = `${titleStr} · iPlayground 2026`;

  const sidebar = NEWS_DATA.map((item, i) => `
    <a class="sidebar-item ${i === id ? 'active' : ''}" href="news.html?id=${i}">
      <div class="s-date">${item.date}</div>
      <div class="s-title">${getVal(item.title)}</div>
    </a>
  `).join("");

  const options = NEWS_DATA.map((item, i) =>
    `<option value="${i}" ${i === id ? 'selected' : ''}>${item.date}　${getVal(item.title)}</option>`
  ).join("");

  root.innerHTML = `
    <div class="mobile-picker" id="mobilePicker">
      <label>${t("news_mobile_label")}</label>
      <select id="newsSelect">${options}</select>
    </div>
    <div class="news-page-layout">
      <aside class="news-sidebar">
        <div class="sidebar-heading">${t("news_sidebar_heading")}</div>
        ${sidebar}
      </aside>
      <main class="news-main">
        <header class="article-header" id="artHeader">
          <div class="article-date">${n.date}</div>
          <h1 class="article-title">${titleStr}</h1>
        </header>
        <article class="article-body" id="artBody">
          ${getVal(n.content)}
          ${renderShareBlock(id, titleStr)}
        </article>
      </main>
    </div>
  `;
  bindShareButtons();

  const sel = document.getElementById("newsSelect");
  if (sel) {
    sel.addEventListener("change", function() {
      const newId = parseInt(this.value, 10);
      const item = NEWS_DATA[newId];
      const iTitle = getVal(item.title);
      document.getElementById("artHeader").innerHTML = `
        <div class="article-date">${item.date}</div>
        <h1 class="article-title">${iTitle}</h1>
      `;
      document.getElementById("artBody").innerHTML = getVal(item.content) + renderShareBlock(newId, iTitle);
      document.title = `${iTitle} · iPlayground 2026`;
      updateArticleMeta(newId, iTitle);
      bindShareButtons();
      history.replaceState(null, "", `news.html?id=${newId}`);
    });
  }
}

// ===== Init — 並行載入所有資料後初始化 =====
const savedLang = (() => { try { return localStorage.getItem("lang"); } catch(e) { return null; } })() || "zh";
const savedAppearance = (() => { try { return localStorage.getItem("appearance"); } catch(e) { return null; } })() || "auto";
const savedHue = (() => { try { return localStorage.getItem("hue"); } catch(e) { return null; } })() || 230;
document.documentElement.style.setProperty("--hue", savedHue);
applyAppearance(savedAppearance);

Promise.all([
  fetch("data/iplayground_i18n.json").then(r => r.json()),
  fetch("data/iplayground_news.json").then(r => r.json()),
  fetch("data/iplayground_config.json").then(r => r.json()),
]).then(([i18n, news, config]) => {
  I18N_DATA = i18n;
  NEWS_DATA  = news;
  CONFIG     = config;
  applyLang(savedLang);
}).catch(e => {
  console.warn("資料載入失敗", e);
  applyLang(savedLang);
});
</script>
</body>
