<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>太空船維修模擬器</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: sans-serif;
    }

    .game-container {
      width: 960px;
      height: 200px;
      background: rgba(30, 41, 59, 0.5);
      border: 2px solid #334155;
      border-radius: 12px;
      position: relative;
      overflow: hidden;
    }

    .spaceship {
      position: absolute;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      font-size: 120px;
      z-index: 10;
      filter: drop-shadow(0 0 20px rgba(52, 152, 219, 0.6));
      animation: shake 0.1s infinite;
      user-select: none;
      line-height: 1;
    }

    @keyframes shake {
      0%,  100% { transform: translate(-50%, 0); }
      25%        { transform: translate(calc(-50% + 1px),  1px); }
      75%        { transform: translate(calc(-50% - 1px), -1px); }
    }

    @keyframes bounce {
      0%,  100% { transform: translateY(0); }
      45%        { transform: translateY(-18px); }
      55%        { transform: translateY(2px) scaleY(0.7); }
    }

    @keyframes drop-in {
      from { opacity: 0; transform: translateY(-60px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .spirit {
      position: absolute;
      font-size: 32px;
      z-index: 20;
      user-select: none;
      bottom: 40px;
      animation: bounce var(--speed) infinite, drop-in 0.4s ease-out;
      transition: left 0.4s ease-out;
    }

    .grass-belt {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 40px;
      background: #064e3b;
      border-top: 3px solid #059669;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 16px;
      z-index: 30;
    }

    .social-toolbar {
      margin-top: 15px;
      display: flex;
      gap: 15px;
    }

    .social-btn {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 20px;
      color: white;
      border: none;
    }

    .social-btn:hover {
      transform: translateY(-3px);
      filter: brightness(1.1);
    }

    .btn-fb { background: #1877f2; }
    .btn-x  { background: #000000; }
    .btn-yt { background: #ff0000; }
    .btn-ig { background: #e4405f; }
  </style>
</head>
<body>

  <div class="game-container">
    <div class="spaceship">🛸</div>
    <div id="spiritLayer"></div>
    <div class="grass-belt">
      🌿🌼🌱🌸🌿🌻🌱🌷🌿🌼🌱🌸🌿🌻🌱🌷🌿🌼🌱🌸🌿🌻🌱🌷🌿🌼🌱🌸🌿🌻🌱🌷🌿
    </div>
  </div>

  <div class="social-toolbar">
    <button class="social-btn btn-fb" onclick="addSpirit('fb')">f</button>
    <button class="social-btn btn-x"  onclick="addSpirit('x')">𝕏</button>
    <button class="social-btn btn-yt" onclick="addSpirit('yt')">▶</button>
    <button class="social-btn btn-ig" onclick="addSpirit('ig')">�</button>
  </div>

  <script>
    const ICONS     = { fb: '👽', x: '🤖', yt: '👨‍🏭', ig: '👾' };
    const MAX       = 20;
    const SCENE_W   = 850;
    const spirits   = [];   // { el, speed }
    const layer     = document.getElementById('spiritLayer');

    function addSpirit(type) {
      const speed = (0.4 + Math.random() * 0.15).toFixed(2);

      const el = document.createElement('div');
      el.className = 'spirit';
      el.textContent = ICONS[type];
      el.style.setProperty('--speed', speed + 's');
      layer.appendChild(el);

      spirits.push({ el, speed });

      // Remove oldest if over limit
      if (spirits.length > MAX) {
        const removed = spirits.shift();
        removed.el.remove();
      }

      reposition();
    }

    function reposition() {
      const total   = spirits.length;
      const spacing = total > 1 ? SCENE_W / (total - 1) : 0;

      spirits.forEach(({ el }, i) => {
        const x       = total > 1 ? i * spacing - SCENE_W / 2 : 0;
        const yOffset = (i % 3) * 5;
        el.style.left   = `calc(50% + ${x}px - 16px)`;
        el.style.bottom = `${40 + yOffset}px`;
      });
    }
  </script>
</body>
</html>
